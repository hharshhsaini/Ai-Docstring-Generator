# Example GitHub Actions workflow for docstring coverage checking
# Place this file in .github/workflows/ to enable automated docstring checks on PRs
#
# This workflow:
# 1. Runs on pull requests that modify Python files
# 2. Checks docstring coverage and enforces minimum threshold
# 3. Generates a coverage report and posts it as a PR comment
# 4. Outputs GitHub Actions annotations for missing docstrings

name: Docstring Coverage Check

on:
  pull_request:
    paths:
      - '**.py'
      - 'docgen.toml'
      - '.github/workflows/docstring-check.yml'
  # Optional: Run on push to main branch
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - '**.py'

jobs:
  check-docstrings:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history for accurate git operations
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install docstring-generator
        run: |
          pip install docstring-generator
      
      - name: Check docstring coverage
        id: coverage
        env:
          # Set your LLM provider API key as a GitHub secret
          # For Anthropic: Settings > Secrets > Actions > New repository secret
          # Name: ANTHROPIC_API_KEY, Value: your-api-key
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # For OpenAI, use:
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Generate coverage report in JSON format
          docgen . --report --format json --min-coverage 80 > coverage.json || true
          
          # Also generate text format for display
          docgen . --report --format text > coverage.txt || true
          
          # Check if coverage meets threshold (exit code 1 if below threshold)
          docgen . --check --min-coverage 80
        continue-on-error: true
      
      - name: Display coverage report
        if: always()
        run: |
          echo "## Docstring Coverage Report"
          cat coverage.txt
      
      - name: Parse coverage results
        id: parse
        if: always()
        run: |
          # Extract coverage percentage from JSON
          COVERAGE=$(jq -r '.coverage_percentage' coverage.json)
          TOTAL=$(jq -r '.total_functions' coverage.json)
          DOCUMENTED=$(jq -r '.documented_functions' coverage.json)
          MISSING=$(jq -r '.missing_docstrings | length' coverage.json)
          
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "documented=$DOCUMENTED" >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT
      
      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read coverage data
            let coverage;
            try {
              coverage = JSON.parse(fs.readFileSync('coverage.json', 'utf8'));
            } catch (error) {
              console.log('Could not read coverage.json:', error);
              return;
            }
            
            // Format missing docstrings list
            const missingList = coverage.missing_docstrings
              .slice(0, 20)  // Limit to first 20 to avoid huge comments
              .map(([file, line]) => `- \`${file}:${line}\``)
              .join('\n');
            
            const hasMore = coverage.missing_docstrings.length > 20;
            const moreText = hasMore 
              ? `\n\n_...and ${coverage.missing_docstrings.length - 20} more_`
              : '';
            
            // Determine status emoji
            const coveragePercent = coverage.coverage_percentage.toFixed(2);
            const statusEmoji = coveragePercent >= 80 ? '✅' : '⚠️';
            
            // Create comment body
            const comment = `## ${statusEmoji} Docstring Coverage Report
            
            | Metric | Value |
            |--------|-------|
            | **Coverage** | **${coveragePercent}%** |
            | Total Functions | ${coverage.total_functions} |
            | Documented | ${coverage.documented_functions} |
            | Missing Docstrings | ${coverage.missing_docstrings.length} |
            
            ${coverage.missing_docstrings.length > 0 ? `### Missing Docstrings\n\n${missingList}${moreText}` : '### All functions are documented! 🎉'}
            
            ---
            <sub>Minimum required coverage: 80%</sub>
            `;
            
            // Post comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Generate GitHub Actions annotations
        if: always()
        run: |
          # Output annotations for missing docstrings
          jq -r '.missing_docstrings[] | "::warning file=\(.[0]),line=\(.[1])::Missing docstring"' coverage.json
      
      - name: Fail if coverage below threshold
        if: steps.coverage.outcome == 'failure'
        run: |
          echo "❌ Docstring coverage is below the minimum threshold of 80%"
          exit 1
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docstring-coverage-report
          path: |
            coverage.json
            coverage.txt
          retention-days: 30

